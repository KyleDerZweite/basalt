sites:
    - name: GitHub
      url_template: https://github.com/{username}
      url_main: https://github.com
      category: coding
      tags:
        - developer
        - git
        - open-source
      seed_types:
        - username
      check:
        method: GET
        expected_status: 200
        presence_strings:
            - js-profile-editable-area
        absence_strings:
            - This is not the web page you are looking for
      test_accounts:
        claimed: torvalds
        unclaimed: zzz-basalt-nonexistent-user-zzz
      rate_limit:
        requests_per_second: 3
        burst: 5
      probe_url: https://api.github.com/users/{username}
      extract:
        - field: display_name
          regex: '"name":\s*"([^"]+)"'
        - field: bio
          regex: '"bio":\s*"([^"]+)"'
        - field: location
          regex: '"location":\s*"([^"]+)"'
        - field: blog
          regex: '"blog":\s*"([^"]+)"'
          pivot: true
        - field: email
          regex: '"email":\s*"([^"]+)"'
          pivot: true
        - field: twitter
          regex: '"twitter_username":\s*"([^"]+)"'
          pivot: true
