name: Dependabot Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub auto-merge for conflict-free Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          merge_state="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json mergeStateStatus --jq '.mergeStateStatus')"
          if [ "$merge_state" = "DIRTY" ]; then
            echo "PR has merge conflicts. Leaving auto-merge disabled."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPOSITORY" --auto --squash
