name: Bug Report
description: Report a bug or incorrect behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The command you ran and any relevant config.
      placeholder: |
        basalt scan -u someuser --verbose
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Basalt version
      description: Output of `basalt --version` or commit hash.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Ubuntu 24.04, macOS 15, Windows 11"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or `--verbose` output.
      render: shell
    validations:
      required: false
